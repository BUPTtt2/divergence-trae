services:
  - type: web
    name: yance-bagua-engine
    runtime: node
    plan: free
    rootDir: server
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGIN
        value: https://yance-bagua.surge.sh
      - key: DEEPSEEK_API_KEY
        sync: false
